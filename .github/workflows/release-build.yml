name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            arch: x86_64
          - os: windows
            runner: windows-latest
            arch: x86_64
          - os: macos
            runner: macos-latest
            arch: arm64
          - os: macos
            runner: macos-15-intel
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller batchroute.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: batchroute-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/batchroute/**

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python -c "
          import shutil, sys
          version = '${{ github.ref_name }}'.lstrip('v')
          platform = '${{ matrix.os }}'
          arch = '${{ matrix.arch }}'
          fmt = 'zip' if sys.platform == 'win32' else 'gztar'
          shutil.make_archive(
              f'batchroute-{version}-{platform}-{arch}',
              fmt,
              root_dir='dist',
              base_dir='batchroute',
          )
          "

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python -c "
          import os
          tag = os.environ['GITHUB_REF_NAME']
          repo = os.environ['GITHUB_REPOSITORY']
          url_base = f'https://github.com/{repo}/releases/download/{tag}'
          body = f'''## batchroute {tag}

          Batch traceroute tool with topology visualization.

          ### Downloads

          | Platform | Architecture | Archive |
          |----------|--------------|---------|
          | Linux | x86_64 | [batchroute-{tag}-linux-x86_64.tar.gz]({url_base}/batchroute-{tag}-linux-x86_64.tar.gz) |
          | macOS | ARM64 | [batchroute-{tag}-macos-arm64.tar.gz]({url_base}/batchroute-{tag}-macos-arm64.tar.gz) |
          | macOS | Intel (x86_64) | [batchroute-{tag}-macos-x86_64.tar.gz]({url_base}/batchroute-{tag}-macos-x86_64.tar.gz) |
          | Windows | x86_64 | [batchroute-{tag}-windows-x86_64.zip]({url_base}/batchroute-{tag}-windows-x86_64.zip) |

          ### Platform Notes

          - **Linux / macOS:** The binary requires root (or `CAP_NET_RAW`) for raw packet transmission. This is an OS security restriction.
          - **Windows:** Users must install [Npcap](https://npcap.com/) (or WinPcap) beforehand; the driver cannot be bundled.

          ### Quick Start

          ```bash
          # Extract and run
          ./batchroute --help

          # Example probe
          sudo ./batchroute 1.1.1.1
          sudo ./batchroute -f targets.txt
          ```
          '''
          with open('release-notes.md', 'w') as f:
              f.write(body)
          "

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: batchroute-*
          body_path: release-notes.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
