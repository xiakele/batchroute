name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            arch: x86_64
          - os: windows
            runner: windows-latest
            arch: x86_64
          - os: macos
            runner: macos-latest
            arch: arm64
          - os: macos
            runner: macos-15-intel
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller batchroute.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: batchroute-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/batchroute/**

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python -c "
          import shutil, sys
          version = '${{ github.ref_name }}'.lstrip('v')
          platform = '${{ matrix.os }}'
          arch = '${{ matrix.arch }}'
          fmt = 'zip' if sys.platform == 'win32' else 'gztar'
          shutil.make_archive(
              f'batchroute-{version}-{platform}-{arch}',
              fmt,
              root_dir='dist',
              base_dir='batchroute',
          )
          "

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: python scripts/generate_release_notes.py

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: batchroute-*
          body_path: release-notes.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
